<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>智家电器官网</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      line-height: 1.6;
      color: #222;
    }

    header {
      background: #0f172a;
      color: white;
      padding: 20px 60px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    header h1 {
      font-size: 22px;
    }

    nav a {
      color: white;
      margin-left: 20px;
      text-decoration: none;
    }

    .hero {
      height: 80vh;
      background: linear-gradient(to right, #0ea5e9, #1e3a8a);
      color: white;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 20px;
    }

    .hero h2 {
      font-size: 48px;
      margin-bottom: 20px;
    }

    .hero p {
      font-size: 18px;
      max-width: 600px;
    }

    .btn {
      margin-top: 20px;
      padding: 12px 24px;
      background: #22c55e;
      border: none;
      color: white;
      cursor: pointer;
      border-radius: 8px;
      font-size: 16px;
    }

    .section {
      padding: 60px;
      text-align: center;
    }

    .products {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      margin-top: 30px;
    }

    .card {
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
      background: white;
    }

    .card h3 {
      margin-bottom: 10px;
    }

    footer {
      background: #0f172a;
      color: white;
      text-align: center;
      padding: 20px;
      margin-top: 40px;
    }
  </style>
</head>
<body>

<header>
  <h1>智家电器</h1>
  <nav>
    <a href="#products">产品</a>
    <a href="#about">关于我们</a>
    <a href="#contact">联系</a>
  </nav>
</header>

<section class="hero">
  <h2>智能家电 · 改变生活</h2>
  <p>我们提供高品质智能冰箱、空调、洗衣机与厨房电器，让科技融入你的家庭。</p>
  <button class="btn">立即选购</button>
</section>

<section id="products" class="section">
  <h2>热门产品</h2>
  <div class="products">
    <div class="card">
      <h3>智能冰箱</h3>
      <p>节能静音，AI温控管理</p>
    </div>
    <div class="card">
      <h3>变频空调</h3>
      <p>快速制冷，智能省电</p>
    </div>
    <div class="card">
      <h3>全自动洗衣机</h3>
      <p>深层清洁，自动识别衣物</p>
    </div>
    <div class="card">
      <h3>智能烤箱</h3>
      <p>多模式烹饪，远程控制</p>
    </div>
  </div>
</section>

<section id="about" class="section" style="background:#f1f5f9;">
  <h2>关于我们</h2>
  <p>智家电器成立于2015年，专注于智能家居设备研发与销售，致力于打造未来家庭生活方式。</p>
</section>

<section id="contact" class="section">
  <h2>联系我们</h2>
  <p>邮箱：support@zhijia.com</p>
  <p>电话：400-888-8888</p>
</section>

<footer>
  © 2026 智家电器官方网站. All rights reserved.
</footer>

</body>
</html>
